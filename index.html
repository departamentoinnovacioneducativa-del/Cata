<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> PRIMERA GRAN CATA INICIATICA DE VINO MASÓNICO 2026 </title>
    
    <!-- Manifest para PWA (App móvil) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="copa.png"> 
    <link rel="icon" href="copa.png">

    <!-- Script del Chatbot -->
    <script async type="text/javascript" src="https://collectcdn.com/embed.js"></script>

    <!-- Tipografía Elegante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #000000;
            --text-color: #e0e0e0;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --wine: #722f37;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-gold: rgba(212, 175, 55, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Lienzo para las ascuas de fuego */
        #fire-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Asegurar que el contenido esté sobre el lienzo */
        header, section, footer, .interactive-container {
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 100px 20px 60px;
            border-bottom: 1px solid var(--border-gold);
            animation: fadeInUp 1.2s ease-out;
        }

        header::after {
            content: '✦';
            color: var(--gold);
            font-size: 1.5rem;
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 15px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            background: linear-gradient(to right, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.8));
        }

        .subtitle {
            font-style: italic;
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: #b0b0b0;
            letter-spacing: 2px;
            font-weight: 300;
        }

        #countdown-section {
            text-align: center;
            padding: 80px 20px;
            animation: fadeInUp 1.4s ease-out;
        }

        #countdown-section h2 {
            font-family: 'Cinzel', serif;
            color: var(--text-color);
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .time-box {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            border: 1px solid var(--border-gold);
            padding: 30px 20px;
            border-radius: 8px;
            min-width: 130px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .time-box span {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 6vw, 4.5rem);
            font-weight: 700;
            color: var(--gold-light);
            display: block;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            line-height: 1;
            margin-bottom: 10px;
        }

        .time-box .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            font-family: 'Cinzel', serif;
        }

        .event-date {
            margin-top: 40px;
            font-size: 1.4rem;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* Contenedor Flexbox para PC (Chatbot y Mapa lado a lado) */
        .interactive-container {
            display: flex;
            flex-direction: column;
            gap: 60px;
            padding: 60px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .interactive-section {
            flex: 1;
            text-align: center;
            animation: fadeInUp 1.6s ease-out;
        }

        .interactive-section h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 30px;
            letter-spacing: 3px;
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .chat-container {
            background: var(--glass-bg);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            height: 600px;
        }

        .map-instruction {
            margin-bottom: 25px;
            color: #888;
            font-style: italic;
            font-size: 1.1rem;
        }

        .map-controls {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .map-controls button {
            background: linear-gradient(145deg, #1a1a1a, #000000);
            color: var(--gold);
            border: 1px solid var(--border-gold);
            padding: 12px 35px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .map-controls button:hover {
            background: linear-gradient(145deg, var(--gold), #b8902b);
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        #sheet-wrapper {
            width: 100%;
            height: 500px;
            overflow: auto;
            border: 1px solid var(--border-gold);
            background: #fff;
            border-radius: 12px;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            -webkit-overflow-scrolling: touch;
        }

        #sheetFrame {
            width: 200%;
            height: 200%;
            border: none;
            transform-origin: top left;
            transform: scale(0.5);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            border-top: 1px solid var(--border-gold);
            color: #666;
            font-size: 0.9rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            margin-top: 40px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVIDAD: PC Y TABLET GRANDE */
        @media (min-width: 992px) {
            .interactive-container {
                flex-direction: row;
                align-items: flex-start;
            }
            /* En PC, el mapa es un poco más ancho */
            .map-section {
                flex: 1.4;
            }
        }

        /* RESPONSIVIDAD: CELULARES */
        @media (max-width: 768px) {
            .time-box {
                min-width: 70px;
                padding: 20px 10px;
            }
            .time-box .label {
                font-size: 0.7rem;
                letter-spacing: 1px;
            }
            #sheet-wrapper {
                height: 450px;
            }
            h1 {
                letter-spacing: 3px;
            }
            .chat-container {
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <!-- Lienzo de Ascuas de Fuego -->
    <canvas id="fire-canvas"></canvas>

    <header>
        <h1>Cata de Vino Masónico</h1>
        <p class="subtitle">Te invitamos a compartir este momento con nosotros</p>
    </header>

    <!-- Sección de Cuenta Regresiva -->
    <section id="countdown-section">
        <h2>Faltan</h2>
        <div id="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <div class="label">Días</div>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <div class="label">Horas</div>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <div class="label">Minutos</div>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <div class="label">Segundos</div>
            </div>
        </div>
        <p class="event-date">21 de Noviembre de 2026 a las 18:00 hrs</p>
    </section>

    <!-- Contenedor de Chatbot y Mapa (2 columnas en PC) -->
    <div class="interactive-container">
        
        <!-- Columna 1: Chatbot -->
        <section class="interactive-section chat-section">
            <h2>Adquisición de Boletos</h2>
            <div class="chat-container">
                <iframe src="https://links.collect.chat/6a4f40a2b9dd7aeb4218b40a" width="100%" height="100%" frameBorder="0"></iframe>
            </div>
        </section>

        <!-- Columna 2: Mapa de Asientos -->
        <section class="interactive-section map-section">
            <h2>Mapa de Asientos</h2>
            <p class="map-instruction">Use los controles para acercarse y explorar la disponibilidad</p>
            
            <div class="map-controls">
                <button id="zoomIn">+ Acercar</button>
                <button id="zoomOut">- Alejar</button>
            </div>

            <div id="sheet-wrapper">
                <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRa33lBX0VDixplZDoNP82DW4rsE20koJdU0e1thUEm6k6e-rBRB9BY5VZPqw2KF9NBgzBq4W-LTvKG/pubhtml?widget=true&headers=false&gid=0"></iframe>
            </div>
        </section>

    </div>

    <footer>
        <p>&copy; Camelot 32</p>
    </footer>

    <script>
        // === EFECTO DE ASCUAS DE FUEGO CAYENDO ===
        const canvas = document.getElementById('fire-canvas');
        const ctx = canvas.getContext('2d');
        let embers = [];

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setCanvasSize);
        setCanvasSize();

        class Ember {
            constructor() {
                this.reset(true);
            }
            reset(initial = false) {
                this.x = Math.random() * canvas.width;
                this.y = initial ? Math.random() * canvas.height : -10;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 1.2 + 0.3;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.opacity = Math.random() * 0.6 + 0.2;
                // Colores: Naranja oscuro a Dorado
                this.color = Math.random() > 0.5 ? '255, 140, 0' : '255, 215, 0'; 
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > canvas.height + 10) {
                    this.reset(false);
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${this.color}, 0.8)`;
                ctx.fill();
            }
        }

        function initEmbers() {
            embers = [];
            const count = Math.floor(window.innerWidth / 20); // Densidad
            for (let i = 0; i < count; i++) {
                embers.push(new Ember());
            }
        }

        function animateEmbers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            embers.forEach(ember => {
                ember.update();
                ember.draw();
            });
            requestAnimationFrame(animateEmbers);
        }

        initEmbers();
        animateEmbers();
        window.addEventListener('resize', initEmbers);


        // === CUENTA REGRESIVA ===
        const eventDate = new Date('2026-11-21T18:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = eventDate - now;

            const days = Math.max(0, Math.floor(distance / (1000 * 60 * 60 * 24)));
            const hours = Math.max(0, Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            const minutes = Math.max(0, Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
            const seconds = Math.max(0, Math.floor((distance % (1000 * 60)) / 1000));

            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // === CONTROL DE ZOOM PARA EL MAPA DE ASIENTOS ===
        let zoomLevel = 0.5; 
        const iframe = document.getElementById('sheetFrame');

        function applyZoom() {
            iframe.style.width = (100 / zoomLevel) + "%";
            iframe.style.height = (100 / zoomLevel) + "%";
            iframe.style.transform = `scale(${zoomLevel})`;
        }

        document.getElementById('zoomIn').addEventListener('click', () => {
            if (zoomLevel < 2) {
                zoomLevel += 0.25;
                applyZoom();
            }
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            if (zoomLevel > 0.5) {
                zoomLevel -= 0.25;
                applyZoom();
            }
        });

        applyZoom();

        // === REGISTRO DE PWA ===
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registrado.', reg))
                    .catch(err => console.log('Error SW:', err));
            });
        }
    </script>
</body>
</html>
